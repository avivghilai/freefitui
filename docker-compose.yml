services:
  postgres:
    image: postgres:16-alpine
    container_name: freefit-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: freefit
      POSTGRES_USER: freefit
      POSTGRES_PASSWORD: freefit_dev
    volumes:
      - freefit_pgdata:/var/lib/postgresql/data

volumes:
  freefit_pgdata:
